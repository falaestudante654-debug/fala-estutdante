<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fala Estudante</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Fala Estudante</h1>
  <p>Espaço para registrar experiências, sugestões, elogios e reclamações relacionadas ao ambiente acadêmico.</p>

  <form>
    <label for="tipo">Tipo de relato</label>
    <select id="tipo" required>
      <option value="">Selecione...</option>
      <option value="Elogio">Elogio</option>
      <option value="Sugestão">Sugestão</option>
      <option value="Reclamação">Reclamação</option>
      <option value="Denúncia">Denúncia</option>
      <option value="Outro">Outro</option>
    </select>

    <label for="data">Data aproximada</label>
    <input type="date" id="data" required />

    <label for="local">Local</label>
    <input type="text" id="local" placeholder="Ex: Bloco A, Biblioteca..." required />

    <label for="descricao">Descrição</label>
    <textarea id="descricao" rows="5" placeholder="Descreva o ocorrido..." required></textarea>

    <button type="submit">Enviar Relato</button>
  </form>

  <div id="mensagem"></div>

  <script type="module" src="app.js"></script>

</body>
</html>
