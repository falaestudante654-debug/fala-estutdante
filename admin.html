<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Fala Estudante</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <span class="logo">🔐</span>
      <div>
        <h1>Painel Admin</h1>
        <p>Acesso restrito · Fala Estudante</p>
      </div>
    </div>
  </header>

  <main>
    <div id="login-box">
      <p style="margin-bottom:16px; color:#555; text-align:center;">
        Apenas administradores autorizados podem acessar este painel.
      </p>
      <button id="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" />
        Entrar com Google
      </button>
      <div id="erro-login"></div>
    </div>

    <div id="painel" style="display:none">
      <div class="admin-topbar">
        <span id="usuario-logado"></span>
        <button id="btn-sair">Sair</button>
      </div>

      <div class="filtros">
        <select id="filtro-tipo">
          <option value="">Todos os tipos</option>
          <option value="Elogio">😊 Elogio</option>
          <option value="Sugestão">💡 Sugestão</option>
          <option value="Reclamação">😠 Reclamação</option>
          <option value="Denúncia">🚨 Denúncia</option>
        </select>
      </div>

      <div id="lista-relatos"></div>
    </div>
  </main>

  <script type="module" src="admin.js"></script>
</body>
</html>
